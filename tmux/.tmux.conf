# Use Ctrl-a as prefix (like screen)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Better key timing
set -s escape-time 10

# Start windows/panes index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Split panes with | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Easy reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Mouse support
set -g mouse on

# Vi-style copy mode
setw -g mode-keys vi

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 90
set -g status-left '#[fg=green]#S #[default]'
set -g status-right '#[fg=cyan]%Y-%m-%d %H:%M #[default]'

# Improve terminal behavior
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Keep a large scrollback history
set -g history-limit 100000

bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"  \; run-shell "tmux display-message 'copied!'"
